<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="clique"></p>


    <button onclick="contagem()">Clique</button>
    <script>
        let n=0;
        function contagem(){
            n=n+1;
           
            document.getElementById("clique").innerHTML="cliques: "+n;
        }
      



    </script>

</body>
</html>
